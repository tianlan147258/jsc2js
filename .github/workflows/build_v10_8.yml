name: Build V8 10.8 d8

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build V8 10.8.168.25 d8 (Windows)
    runs-on: windows-2022
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
    steps:
      - name: Checkout infra
        uses: actions/checkout@v4

      - name: Setup Git
        run: git config --global core.autocrlf false

      - name: Setup SDK symlink (10.0.20348.0 -> 10.0.22621.0)
        run: |
          $base = "C:\Program Files (x86)\Windows Kits\10"
          $src = "$base\Include\10.0.22621.0"
          $dst = "$base\Include\10.0.20348.0"
          $srcLib = "$base\Lib\10.0.22621.0"
          $dstLib = "$base\Lib\10.0.20348.0"
          New-Item -ItemType Junction -Path $dst -Target $src -Force
          New-Item -ItemType Junction -Path $dstLib -Target $srcLib -Force
          Write-Host "Created symlinks for SDK 10.0.20348.0 -> 10.0.22621.0"
        shell: pwsh

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "PYTHONUTF8=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PYTHONIOENCODING=UTF-8" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Sync V8 source
        run: |
          gclient config --name v8 --unmanaged https://github.com/v8/v8.git
          gclient sync --nohooks -D --no-history --revision v8@10.8.168.25
          gclient runhooks
        shell: bash

      - name: Apply V8 10.8 patches
        run: |
          cp patch_v10_8.py v8/
          cd v8
          python3 patch_v10_8.py
        shell: bash

      - name: Generate build config
        run: |
          cd v8
          python tools/dev/v8gen.py -vv x64.release -- v8_monolithic=true v8_use_external_startup_data=false is_component_build=false is_debug=false target_cpu="x64" treat_warnings_as_errors=false
        shell: bash

      - name: Build d8
        run: |
          cd v8
          sleep 1
          touch out.gn/x64.release/build.ninja.stamp
          ninja -C out.gn/x64.release -j 4 d8
        shell: bash

      - name: Prepare artifact
        run: |
          mkdir artifacts
          cp v8/out.gn/x64.release/d8.exe artifacts/
          cp v8/out.gn/x64.release/snapshot_blob.bin artifacts/
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: d8-v10.8.168.25-Windows
          path: |
            artifacts/d8.exe
            artifacts/snapshot_blob.bin
          retention-days: 7